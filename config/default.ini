; Cockscreen runtime defaults read by Qt QSettings (INI format).
; Load with: --config-file config/default.ini

[runtime]
video_device=/dev/video0
audio_device=
osc_endpoint=0.0.0.0:9000
midi_input=
shader_directory=../shaders
shader_file=pixelize_loop.glsl
screen_shader_file=triangle_rotate.glsl
top_layer=video
top_layer_opacity=0.75
render_path=qt-shader
window_title=cockscreen
width=1024
height=600
frame_rate=30
scene_file=../scenes/example.scene.json
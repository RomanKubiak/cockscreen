; Cockscreen defaults for a generic x86_64 Linux machine
; Load with: --config-file config/x86_64-linux.ini

[runtime]
video_device=/dev/video1
; Use the loud playback monitor for the headset on this machine.
audio_device=VMK15
osc_endpoint=0.0.0.0:9000
midi_input=Midi Through Port-0
shader_directory=../shaders
shader_file=passthrough.glsl
screen_shader_file=triangle_rotate.glsl
top_layer=video
top_layer_opacity=0.85
render_path=qt-shader
window_title=cockscreen
width=1024
height=600
frame_rate=30
scene_file=../scenes/x86_64-linux.scene.json
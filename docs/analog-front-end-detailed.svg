<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220" role="img" aria-label="Detailed analog front end schematic">
  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .panel { fill: #ffffff; stroke: #202020; stroke-width: 2.5; rx: 18; ry: 18; }
      .chip { fill: #eef3ff; stroke: #1d3b66; stroke-width: 2.5; rx: 16; ry: 16; }
      .green { fill: #eef9ee; stroke: #27632a; stroke-width: 2.5; rx: 16; ry: 16; }
      .yellow { fill: #fff8e8; stroke: #8a5b00; stroke-width: 2.5; rx: 16; ry: 16; }
      .label { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; }
      .small { fill: #333; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .tiny { fill: #555; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
      .title { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #333; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .wire { stroke: #2f2f2f; stroke-width: 4; fill: none; }
      .wire2 { stroke: #2f2f2f; stroke-width: 2.5; fill: none; }
      .dash { stroke-dasharray: 10 7; }
      .arrow { marker-end: url(#arrow); }
      .rail3v3 { stroke: #a11; stroke-width: 4; fill: none; }
      .railgnd { stroke: #222; stroke-width: 4; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f2f2f"/>
    </marker>

    <g id="res-1k">
      <rect x="0" y="0" width="54" height="16" rx="2" ry="2" fill="#f2d5a0" stroke="#6f4f1a" stroke-width="1.2"/>
      <rect x="14" y="0" width="4" height="16" fill="#8b5a2b"/>
      <rect x="22" y="0" width="4" height="16" fill="#111111"/>
      <rect x="30" y="0" width="4" height="16" fill="#c62828"/>
      <rect x="42" y="0" width="4" height="16" fill="#d4af37"/>
    </g>

    <g id="res-10k">
      <rect x="0" y="0" width="54" height="16" rx="2" ry="2" fill="#f2d5a0" stroke="#6f4f1a" stroke-width="1.2"/>
      <rect x="14" y="0" width="4" height="16" fill="#8b5a2b"/>
      <rect x="22" y="0" width="4" height="16" fill="#111111"/>
      <rect x="30" y="0" width="4" height="16" fill="#f57c00"/>
      <rect x="42" y="0" width="4" height="16" fill="#d4af37"/>
    </g>

    <g id="res-100k">
      <rect x="0" y="0" width="54" height="16" rx="2" ry="2" fill="#f2d5a0" stroke="#6f4f1a" stroke-width="1.2"/>
      <rect x="14" y="0" width="4" height="16" fill="#8b5a2b"/>
      <rect x="22" y="0" width="4" height="16" fill="#111111"/>
      <rect x="30" y="0" width="4" height="16" fill="#f2c94c"/>
      <rect x="42" y="0" width="4" height="16" fill="#d4af37"/>
    </g>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1220"/>

  <text class="title" x="70" y="56">Detailed analog front end proposal</text>
  <text class="subtitle" x="70" y="84">Pi Zero 2 W / Waveshare ADS1256 board, direct CV on AD1-AD3, desktop control surface in a sloped console, and three gate inputs</text>

  <path class="rail3v3" d="M 70 125 L 1730 125"/>
  <text class="small" x="85" y="116">3V3 rail</text>
  <path class="railgnd" d="M 70 1110 L 1730 1110"/>
  <text class="small" x="85" y="1100">GND rail</text>

  <rect class="panel" x="70" y="160" width="820" height="390"/>
  <text class="label" x="90" y="194">Direct CV inputs on AD1, AD2, AD3</text>
  <text class="small" x="90" y="220">These are not on the mux. They are the direct analog modulation inputs for external CV sources.</text>

  <rect x="95" y="255" width="230" height="225" fill="#fff" stroke="#222" stroke-width="2" rx="14" ry="14"/>
  <text class="small" x="210" y="286" text-anchor="middle">CV1 -> AD1</text>
  <text class="tiny" x="210" y="312" text-anchor="middle">J1 input jack</text>
  <text class="tiny" x="210" y="344" text-anchor="middle">R1 100k / R2 100k</text>
  <text class="tiny" x="210" y="364" text-anchor="middle">2:1 attenuation for 0-10 V</text>
  <text class="tiny" x="210" y="380" text-anchor="middle">R3 1k series</text>
  <text class="tiny" x="210" y="392" text-anchor="middle">D1/D2 1N4148-DIO clamp pair</text>
  <text class="tiny" x="210" y="412" text-anchor="middle">C1 1 nF to GND</text>
  <text class="tiny" x="210" y="432" text-anchor="middle">optional U1 MCP6002-I/P</text>
  <text class="tiny" x="210" y="452" text-anchor="middle">for bipolar level shift</text>

  <rect x="350" y="255" width="230" height="225" fill="#fff" stroke="#222" stroke-width="2" rx="14" ry="14"/>
  <text class="small" x="465" y="286" text-anchor="middle">CV2 -> AD2</text>
  <text class="tiny" x="465" y="312" text-anchor="middle">J2 input jack</text>
  <text class="tiny" x="465" y="344" text-anchor="middle">R1 100k / R2 100k</text>
  <text class="tiny" x="465" y="364" text-anchor="middle">2:1 attenuation for 0-10 V</text>
  <text class="tiny" x="465" y="380" text-anchor="middle">R3 1k series</text>
  <text class="tiny" x="465" y="392" text-anchor="middle">D1/D2 1N4148-DIO clamp pair</text>
  <text class="tiny" x="465" y="412" text-anchor="middle">C1 1 nF to GND</text>
  <text class="tiny" x="465" y="432" text-anchor="middle">optional U1 MCP6002-I/P</text>
  <text class="tiny" x="465" y="452" text-anchor="middle">for bipolar level shift</text>

  <rect x="605" y="255" width="230" height="225" fill="#fff" stroke="#222" stroke-width="2" rx="14" ry="14"/>
  <text class="small" x="720" y="286" text-anchor="middle">CV3 -> AD3</text>
  <text class="tiny" x="720" y="312" text-anchor="middle">J3 input jack</text>
  <text class="tiny" x="720" y="344" text-anchor="middle">R1 100k / R2 100k</text>
  <text class="tiny" x="720" y="364" text-anchor="middle">2:1 attenuation for 0-10 V</text>
  <text class="tiny" x="720" y="380" text-anchor="middle">R3 1k series</text>
  <text class="tiny" x="720" y="392" text-anchor="middle">D1/D2 1N4148-DIO clamp pair</text>
  <text class="tiny" x="720" y="412" text-anchor="middle">C1 1 nF to GND</text>
  <text class="tiny" x="720" y="432" text-anchor="middle">optional U1 MCP6002-I/P</text>
  <text class="tiny" x="720" y="452" text-anchor="middle">for bipolar level shift</text>

  <path class="wire arrow" d="M 325 367 L 350 367"/>
  <path class="wire arrow" d="M 580 367 L 605 367"/>

  <rect class="panel" x="900" y="160" width="830" height="390"/>
  <text class="label" x="920" y="194">Desktop enclosure control surface</text>
  <text class="small" x="920" y="220">Recommended panel: Hammond 1456WL3BKBK sloped console, 15 degree slope, 20.26 x 11.61 x 3.21 in.</text>
  <text class="small" x="920" y="242">Eight manual pots are user-supplied. One NeoSlider is I2C. Two motorized faders use the SN754410NE driver.</text>

  <polygon points="940,262 1350,262 1325,470 965,470" fill="#fff" stroke="#222" stroke-width="2.5"/>
  <text class="tiny" x="1145" y="286" text-anchor="middle">Front panel layout</text>

  <rect x="995" y="296" width="300" height="18" rx="8" fill="#dfe8ff" stroke="#1d3b66" stroke-width="2"/>
  <text class="tiny" x="1145" y="290" text-anchor="middle">NeoSlider I2C module</text>

  <circle cx="1010" cy="350" r="16" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="1090" cy="350" r="16" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="1170" cy="350" r="16" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="1250" cy="350" r="16" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="1010" cy="400" r="16" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="1090" cy="400" r="16" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="1170" cy="400" r="16" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="1250" cy="400" r="16" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <text class="tiny" x="1010" y="330" text-anchor="middle">P1</text>
  <text class="tiny" x="1090" y="330" text-anchor="middle">P2</text>
  <text class="tiny" x="1170" y="330" text-anchor="middle">P3</text>
  <text class="tiny" x="1250" y="330" text-anchor="middle">P4</text>
  <text class="tiny" x="1010" y="380" text-anchor="middle">P5</text>
  <text class="tiny" x="1090" y="380" text-anchor="middle">P6</text>
  <text class="tiny" x="1170" y="380" text-anchor="middle">P7</text>
  <text class="tiny" x="1250" y="380" text-anchor="middle">P8</text>

  <rect x="990" y="432" width="150" height="14" rx="7" fill="#f3ebd0" stroke="#8a5b00" stroke-width="2"/>
  <rect x="1160" y="432" width="150" height="14" rx="7" fill="#f3ebd0" stroke="#8a5b00" stroke-width="2"/>
  <circle cx="1060" cy="439" r="8" fill="#8a5b00"/>
  <circle cx="1230" cy="439" r="8" fill="#8a5b00"/>
  <text class="tiny" x="1065" y="455" text-anchor="middle">F1 motorized fader</text>
  <text class="tiny" x="1235" y="455" text-anchor="middle">F2 motorized fader</text>

  <path class="wire arrow" d="M 1325 304 L 1410 304"/>
  <path class="wire arrow" d="M 1325 348 L 1410 390"/>
  <path class="wire arrow" d="M 1325 439 L 1410 475"/>

  <rect class="chip" x="1410" y="270" width="280" height="70"/>
  <text class="small" x="1550" y="298" text-anchor="middle">CD74HC4067E</text>
  <text class="tiny" x="1550" y="320" text-anchor="middle">manual pots and feedback -> AD0</text>

  <rect class="chip" x="1410" y="355" width="280" height="70"/>
  <text class="small" x="1550" y="383" text-anchor="middle">NeoSlider</text>
  <text class="tiny" x="1550" y="405" text-anchor="middle">I2C to Pi Zero 2 W</text>

  <rect class="green" x="1410" y="440" width="280" height="70"/>
  <text class="small" x="1550" y="468" text-anchor="middle">SN754410NE</text>
  <text class="tiny" x="1550" y="490" text-anchor="middle">motor drive for F1 / F2</text>

  <rect class="panel" x="70" y="590" width="820" height="270"/>
  <text class="label" x="90" y="624">Gate inputs on BCM16, BCM19, BCM20</text>
  <text class="small" x="90" y="650">These are digital gate / trigger inputs converted to clean 3.3 V logic before the Pi sees them.</text>

  <rect class="green" x="95" y="680" width="220" height="130"/>
  <text class="small" x="205" y="710" text-anchor="middle">Gate front-end x3</text>
  <text class="tiny" x="205" y="746" text-anchor="middle">R5 10k series</text>
  <text class="tiny" x="205" y="768" text-anchor="middle">R6 100k pull-down</text>
  <text class="tiny" x="205" y="788" text-anchor="middle">D3/D4 1N4148-DIO clamp pair</text>
  <text class="tiny" x="205" y="796" text-anchor="middle">U2 74LVC14 at 3.3 V</text>

  <rect x="350" y="660" width="250" height="170" fill="#fff" stroke="#222" stroke-width="2" rx="14" ry="14"/>
  <text class="small" x="475" y="692" text-anchor="middle">Gate source</text>
  <text class="tiny" x="475" y="718" text-anchor="middle">sequencer gate / trigger</text>
  <text class="tiny" x="475" y="738" text-anchor="middle">synth gate / envelope out</text>
  <text class="tiny" x="475" y="758" text-anchor="middle">do not connect raw 5 V</text>
  <text class="tiny" x="475" y="778" text-anchor="middle">share ground with Pi</text>
  <text class="tiny" x="475" y="798" text-anchor="middle">clean 3.3 V output only</text>

  <path class="wire arrow" d="M 315 745 L 350 745"/>
  <path class="wire arrow" d="M 600 745 L 645 745"/>

  <rect class="chip" x="645" y="640" width="245" height="210"/>
  <text class="label" x="767" y="672" text-anchor="middle">Pi GPIO inputs</text>
  <text class="small" x="767" y="700" text-anchor="middle">GATE0 -> BCM16 / pin 36</text>
  <text class="small" x="767" y="722" text-anchor="middle">GATE1 -> BCM19 / pin 35</text>
  <text class="small" x="767" y="744" text-anchor="middle">GATE2 -> BCM20 / pin 38</text>
  <text class="small" x="767" y="772" text-anchor="middle">runtime prints gate changes</text>
  <text class="small" x="767" y="794" text-anchor="middle">active high expected</text>
  <text class="small" x="767" y="816" text-anchor="middle">common GND required</text>

  <rect class="panel" x="930" y="590" width="800" height="270"/>
  <text class="label" x="950" y="624">Control-surface wiring map</text>
  <text class="small" x="950" y="656">Manual pots x8</text>
  <text class="tiny" x="950" y="680">P1-P8 are user-supplied 10k pots</text>
  <text class="tiny" x="950" y="700">wipers -> CD74HC4067E -> AD0</text>

  <text class="small" x="1260" y="656">NeoSlider</text>
  <text class="tiny" x="1260" y="680">I2C device to Pi Zero 2 W</text>
  <text class="tiny" x="1260" y="700">kept off the mux</text>

  <text class="small" x="1510" y="656">Motorized faders x2</text>
  <text class="tiny" x="1510" y="680">wipers -> spare AD0 mux channels</text>
  <text class="tiny" x="1510" y="700">motors -> SN754410NE</text>
  <text class="tiny" x="1510" y="720">logic: BCM23, BCM24, BCM25, BCM21</text>
  <text class="tiny" x="1510" y="740">EN pins tied high to 3V3 for first-pass build</text>
  <text class="tiny" x="1510" y="760">Optional shared PWM: tie both EN pins together and use BCM12 only</text>

  <text class="tiny" x="950" y="736">Recommended enclosure: Hammond 1456WL3BKBK sloped console, 15 degree slope, 20.26 x 11.61 x 3.21 in.</text>
  <text class="tiny" x="950" y="758">Use the 20-inch desktop console instead of a rack case; it gives enough front-panel width for the sliders and knob spacing.</text>
  <text class="tiny" x="950" y="780">The Pi and Waveshare board stay on the internal mounting standoffs behind the panel.</text>

  <rect class="panel" x="70" y="900" width="1660" height="220"/>
  <text class="label" x="90" y="934">Board-level wiring summary</text>
  <text class="tiny" x="90" y="964">Direct CV: AD1, AD2, AD3</text>
  <text class="tiny" x="90" y="986">Control surface: eight manual pots, one NeoSlider, and two motorized faders</text>
  <text class="tiny" x="90" y="1008">Motor drive GPIO: BCM23, BCM24, BCM25, BCM21 with SN754410NE enables tied high</text>
  <text class="tiny" x="90" y="1030">Optional shared PWM speed control: tie both enables together and drive from BCM12</text>
  <text class="tiny" x="90" y="1052">Gate inputs: BCM16, BCM19, BCM20</text>
  <text class="tiny" x="90" y="1074">Common power: Waveshare board 3V3 and GND rails</text>
  <text class="tiny" x="90" y="1096">Runtime: Linux AARCH64 only</text>
</svg>

  <path class="sig" d="M 1060 350 L 1105 350 L 1105 750 L 1140 750"/>
  <path class="sig" d="M 530 375 L 700 375" opacity="0"/>

  <path class="i2c" d="M 300 590 L 560 590 L 560 352 L 1175 352"/>
  <path class="i2c" d="M 300 610 L 580 610 L 580 378 L 1175 378"/>

  <path class="sig" d="M 300 335 L 580 335 L 580 304 L 700 304"/>
  <path class="sig" d="M 530 395 L 580 395 L 580 324 L 700 324"/>
  <path class="sig" d="M 530 530 L 620 530 L 620 344 L 700 344"/>
  <path class="sig" d="M 530 550 L 640 550 L 640 364 L 700 364"/>

  <path class="motor" d="M 560 392 L 700 700"/>
  <path class="motor" d="M 560 412 L 700 720"/>
  <path class="motor" d="M 560 527 L 700 740"/>
  <path class="motor" d="M 560 547 L 700 760"/>
  <path class="motor note" d="M 1090 735 L 1175 620"/>
  <path class="motor note" d="M 1090 755 L 1175 646"/>

  <path class="sig" d="M 1060 325 L 1095 325 L 1095 495 L 1175 495" opacity="0"/>

  <path class="sig" d="M 1060 285 L 1100 285 L 1100 520 L 1175 520" opacity="0"/>

  <circle class="dots" cx="700" cy="304" r="5"/>
  <circle class="dots" cx="700" cy="324" r="5"/>
  <circle class="dots" cx="700" cy="344" r="5"/>
  <circle class="dots" cx="700" cy="364" r="5"/>
  <circle class="doti" cx="1175" cy="352" r="5"/>
  <circle class="doti" cx="1175" cy="378" r="5"/>
  <circle class="dotm" cx="700" cy="700" r="5"/>
  <circle class="dotm" cx="700" cy="720" r="5"/>
  <circle class="dotm" cx="700" cy="740" r="5"/>
  <circle class="dotm" cx="700" cy="760" r="5"/>

  <rect class="callout" x="80" y="910" width="1020" height="180"/>
  <text class="small" x="100" y="944">What is exact in the repo today</text>
  <text class="tiny" x="100" y="968">Mux select lines: BCM5, BCM6, BCM13, BCM26 on physical pins 29, 31, 33, 37.</text>
  <text class="tiny" x="100" y="988">NeoSlider I2C: BCM2 / pin 3 for SDA and BCM3 / pin 5 for SCL.</text>
  <text class="tiny" x="100" y="1008">Pot bank and motorized-fader feedback tracks go through the CD74HC4067E into ADS1256 AD0.</text>
  <text class="tiny" x="100" y="1028">5 V_DIG comes from the power board into the Pi header. 3V3 is then available on the Pi header for the control logic side.</text>
  <text class="tiny" x="100" y="1048">All control-surface grounds, the mux ground, the NeoSlider ground, the Pi ground, and the motor-driver ground must remain common.</text>

  <rect class="callout" x="1120" y="910" width="720" height="190"/>
  <text class="small" x="1140" y="944">First-pass motor logic</text>
  <text class="tiny" x="1140" y="968">This revision uses BCM23, BCM24, BCM25, and BCM21 for the four SN754410NE direction inputs.</text>
  <text class="tiny" x="1140" y="988">With `EN` tied high, `1/0` drives one way, `0/1` drives the other way, `0/0` coasts, and `1/1` brakes.</text>
  <text class="tiny" x="1140" y="1008">No-board-modification PWM option: tie both enable pins together and drive them from BCM12 / pin 32.</text>
  <text class="tiny" x="1140" y="1028">That gives one shared speed control lane, so firmware should move only one fader motor at a time.</text>
</svg>
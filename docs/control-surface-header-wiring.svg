  <path class="sig" d="M 1060 470 L 1120 470 L 1120 430 L 1175 430" opacity="0"/>
  <path class="sig" d="M 1060 455 L 1120 455 L 1120 430 L 1175 430" opacity="0"/>

  <path class="sig" d="M 1060 364 L 1110 364 L 1110 820 L 1175 820" opacity="0"/>


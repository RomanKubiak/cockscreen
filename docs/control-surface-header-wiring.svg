<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1600" viewBox="0 0 1900 1600" role="img" aria-label="Control-surface wiring map for Pi 40-pin header and power rails">
  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .panel { fill: #ffffff; stroke: #202020; stroke-width: 2.4; rx: 18; ry: 18; }
      .chip { fill: #eef3ff; stroke: #1d3b66; stroke-width: 2.4; rx: 16; ry: 16; }
      .green { fill: #eef9ee; stroke: #27632a; stroke-width: 2.4; rx: 16; ry: 16; }
      .yellow { fill: #fff8e8; stroke: #8a5b00; stroke-width: 2.4; rx: 16; ry: 16; }
      .warn { fill: #fff0e8; stroke: #a64b00; stroke-width: 2.4; rx: 16; ry: 16; }
      .callout { fill: #fffdf8; stroke: #b7aa96; stroke-width: 1.2; rx: 10; ry: 10; }
      .title { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #333; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .label { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; }
      .small { fill: #333; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .tiny { fill: #555; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
      .pin { fill: #173454; font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; }
      .rail5 { stroke: #27632a; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .rail3 { stroke: #a11; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .railg { stroke: #222; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sig { stroke: #2366a8; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .i2c { stroke: #7a4f00; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .motor { stroke: #8e24aa; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .note { stroke-dasharray: 9 7; }
      .dot5 { fill: #27632a; }
      .dot3 { fill: #a11; }
      .dotg { fill: #222; }
      .dots { fill: #2366a8; }
      .doti { fill: #7a4f00; }
      .dotm { fill: #8e24aa; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f2f2f"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1600"/>

  <text class="title" x="60" y="56">Control-surface wiring to Pi 40-pin header and power rails</text>
  <text class="subtitle" x="60" y="84">This map focuses on the eight manual pots, the AD0 mux, one NeoSlider I2C module,</text>
  <text class="subtitle" x="60" y="104">one MCP23017 I2C button expander with eight buttons, and two motorized faders.</text>
  <text class="subtitle" x="60" y="124">Exact mux and I2C header pins come from the current repo docs. The motor-driver logic</text>
  <text class="subtitle" x="60" y="144">uses a first-pass pin assignment that avoids the already-used ADS1256, mux, gate, and I2C lines.</text>

  <rect class="panel" x="50" y="170" width="560" height="760"/>
  <text class="label" x="80" y="210">Panel elements</text>
  <text class="small" x="80" y="236">All panel controls share the same GND. Pot and fader feedback tracks use</text>
  <text class="small" x="80" y="256">the 3V3 analog-control rail. Buttons use 3V3 logic through the expander.</text>
  <text class="small" x="80" y="276">Fader motors use 5 V_DIG.</text>

  <rect class="panel" x="90" y="270" width="210" height="270"/>
  <text class="label" x="195" y="306" text-anchor="middle">Manual pots P1-P8</text>
  <text class="small" x="195" y="336" text-anchor="middle">10k user-supplied pots</text>
  <text class="tiny" x="195" y="370" text-anchor="middle">outer legs -> 3V3 and GND</text>
  <text class="tiny" x="195" y="392" text-anchor="middle">wipers -> CD74HC4067E C0-C7</text>
  <circle cx="140" cy="440" r="18" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="195" cy="440" r="18" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="250" cy="440" r="18" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="140" cy="495" r="18" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="195" cy="495" r="18" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="250" cy="495" r="18" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="112" cy="468" r="18" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <circle cx="278" cy="468" r="18" fill="#eef3ff" stroke="#1d3b66" stroke-width="2"/>
  <text class="tiny" x="140" y="446" text-anchor="middle">P1</text>
  <text class="tiny" x="195" y="446" text-anchor="middle">P2</text>
  <text class="tiny" x="250" y="446" text-anchor="middle">P3</text>
  <text class="tiny" x="140" y="501" text-anchor="middle">P4</text>
  <text class="tiny" x="195" y="501" text-anchor="middle">P5</text>
  <text class="tiny" x="250" y="501" text-anchor="middle">P6</text>
  <text class="tiny" x="112" y="474" text-anchor="middle">P7</text>
  <text class="tiny" x="278" y="474" text-anchor="middle">P8</text>

  <rect class="green" x="90" y="575" width="210" height="130"/>
  <text class="label" x="195" y="612" text-anchor="middle">NeoSlider</text>
  <text class="small" x="195" y="640" text-anchor="middle">Adafruit I2C module</text>
  <text class="tiny" x="195" y="670" text-anchor="middle">SDA -> BCM2 / pin 3</text>
  <text class="tiny" x="195" y="690" text-anchor="middle">SCL -> BCM3 / pin 5</text>
  <text class="tiny" x="195" y="710" text-anchor="middle">power -> 3V3, common GND</text>

  <rect class="green" x="90" y="740" width="210" height="170"/>
  <text class="label" x="195" y="776" text-anchor="middle">Buttons B1-B8</text>
  <text class="small" x="195" y="804" text-anchor="middle">momentary NO, active-low wiring</text>
  <text class="tiny" x="195" y="832" text-anchor="middle">one side -> MCP23017</text>
  <text class="tiny" x="195" y="850" text-anchor="middle">`GPA0-GPA7` input</text>
  <text class="tiny" x="195" y="868" text-anchor="middle">other side -> common GND</text>
  <text class="tiny" x="195" y="886" text-anchor="middle">enable internal pull-up</text>
  <text class="tiny" x="195" y="904" text-anchor="middle">on each input</text>
  <text class="tiny" x="195" y="922" text-anchor="middle">released = logic 1, pressed = logic 0</text>

  <rect class="yellow" x="330" y="270" width="230" height="435"/>
  <text class="label" x="445" y="306" text-anchor="middle">Motorized faders F1 and F2</text>
  <text class="small" x="445" y="334" text-anchor="middle">COM-10976 style split wiring</text>
  <rect x="360" y="370" width="170" height="100" rx="10" ry="10" fill="#fff" stroke="#8a5b00" stroke-width="2"/>
  <text class="small" x="445" y="402" text-anchor="middle">F1</text>
  <text class="tiny" x="445" y="426" text-anchor="middle">feedback wiper -> mux C8</text>
  <text class="tiny" x="445" y="444" text-anchor="middle">motor leads -> L9110</text>
  <text class="tiny" x="445" y="462" text-anchor="middle">channel A outputs</text>
  <rect x="360" y="505" width="170" height="100" rx="10" ry="10" fill="#fff" stroke="#8a5b00" stroke-width="2"/>
  <text class="small" x="445" y="537" text-anchor="middle">F2</text>
  <text class="tiny" x="445" y="561" text-anchor="middle">feedback wiper -> mux C9</text>
  <text class="tiny" x="445" y="579" text-anchor="middle">motor leads -> L9110</text>
  <text class="tiny" x="445" y="597" text-anchor="middle">channel B outputs</text>
  <text class="tiny" x="445" y="654" text-anchor="middle">touch pins stay optional</text>
  <text class="tiny" x="445" y="672" text-anchor="middle">and are not required</text>

  <rect class="chip" x="670" y="170" width="420" height="520"/>
  <text class="label" x="700" y="210">Signal concentrators</text>

  <rect class="chip" x="700" y="260" width="360" height="180"/>
  <text class="label" x="880" y="294" text-anchor="middle">CD74HC4067E on AD0</text>
  <text class="small" x="880" y="322" text-anchor="middle">Manual pots and fader feedback only</text>
  <text class="tiny" x="880" y="354" text-anchor="middle">C0-C7 &lt;- P1-P8 wipers</text>
  <text class="tiny" x="880" y="374" text-anchor="middle">C8 &lt;- F1 feedback wiper</text>
  <text class="tiny" x="880" y="394" text-anchor="middle">C9 &lt;- F2 feedback wiper</text>
  <text class="tiny" x="880" y="414" text-anchor="middle">COM / SIG -> Waveshare</text>
  <text class="tiny" x="880" y="432" text-anchor="middle">ADS1256 AD0</text>

  <rect class="green" x="700" y="480" width="360" height="90"/>
  <text class="small" x="880" y="512" text-anchor="middle">Waveshare ADS1256 board</text>
  <text class="tiny" x="880" y="534" text-anchor="middle">AD0 receives the mux COM signal</text>
  <text class="tiny" x="880" y="552" text-anchor="middle">3V3 and GND are shared</text>
  <text class="tiny" x="880" y="570" text-anchor="middle">with the control surface</text>

  <rect class="green" x="700" y="590" width="360" height="90"/>
  <text class="small" x="880" y="620" text-anchor="middle">MCP23017 button expander</text>
  <text class="tiny" x="880" y="642" text-anchor="middle">SDA/SCL shared with NeoSlider</text>
  <text class="tiny" x="880" y="660" text-anchor="middle">`A0-A2` -> GND for `0x20`</text>
  <text class="tiny" x="880" y="678" text-anchor="middle">`RESET` -> `3V3`, internal pull-ups enabled</text>

  <rect class="warn" x="670" y="710" width="420" height="220"/>
  <text class="label" x="700" y="750">Motor driver block</text>
  <rect class="warn" x="700" y="780" width="360" height="120"/>
  <text class="label" x="880" y="816" text-anchor="middle">L9110 dual motor module</text>
  <text class="small" x="880" y="844" text-anchor="middle">One two-channel driver for both fader motors</text>
  <text class="tiny" x="880" y="866" text-anchor="middle">VCC -> 5 V_DIG motor rail</text>
  <text class="tiny" x="880" y="884" text-anchor="middle">channel A -> F1 motor, channel B -> F2 motor</text>
  <text class="tiny" x="880" y="902" text-anchor="middle">PWM later goes on the active IA or IB input</text>

  <rect class="panel" x="1140" y="170" width="430" height="760"/>
  <text class="label" x="1170" y="210">Pi Zero 2 W 40-pin header</text>
  <text class="small" x="1170" y="236">Only the pins relevant to the control surface are called out here.</text>
  <text class="small" x="1170" y="256">The ADS1256 stack still uses the SPI and ADC side separately.</text>

  <rect class="chip" x="1175" y="275" width="360" height="310"/>
  <text class="label" x="1355" y="310" text-anchor="middle">Defined control pins</text>
  <text class="pin" x="1205" y="350">pin 1</text>
  <text class="small" x="1260" y="350">3V3 rail out</text>
  <text class="pin" x="1205" y="376">pin 2</text>
  <text class="small" x="1260" y="376">5V input from power board</text>
  <text class="pin" x="1205" y="402">pin 3</text>
  <text class="small" x="1260" y="402">BCM2 / SDA1 -> NeoSlider SDA</text>
  <text class="small" x="1260" y="420">and MCP23017 SDA</text>
  <text class="pin" x="1205" y="446">pin 5</text>
  <text class="small" x="1260" y="446">BCM3 / SCL1 -> NeoSlider SCL</text>
  <text class="small" x="1260" y="464">and MCP23017 SCL</text>
  <text class="pin" x="1205" y="490">pin 6</text>
  <text class="small" x="1260" y="490">GND return</text>
  <text class="pin" x="1205" y="516">pin 29</text>
  <text class="small" x="1260" y="516">BCM5 -> mux S0</text>
  <text class="pin" x="1205" y="542">pin 31</text>
  <text class="small" x="1260" y="542">BCM6 -> mux S1</text>
  <text class="pin" x="1205" y="568">pin 33</text>
  <text class="small" x="1260" y="568">BCM13 -> mux S2</text>
  <text class="pin" x="1205" y="594">pin 37</text>
  <text class="small" x="1260" y="594">BCM26 -> mux S3</text>

  <rect class="warn" x="1175" y="620" width="360" height="220"/>
  <text class="label" x="1355" y="656" text-anchor="middle">Motor logic pins</text>
  <text class="pin" x="1205" y="696">pin 16</text>
  <text class="small" x="1260" y="696">BCM23 -> channel A `IA`</text>
  <text class="small" x="1260" y="714">/ `F1_IA`</text>
  <text class="pin" x="1205" y="740">pin 18</text>
  <text class="small" x="1260" y="740">BCM24 -> channel A `IB`</text>
  <text class="small" x="1260" y="758">/ `F1_IB`</text>
  <text class="pin" x="1205" y="784">pin 22</text>
  <text class="small" x="1260" y="784">BCM25 -> channel B `IA`</text>
  <text class="small" x="1260" y="802">/ `F2_IA`</text>
  <text class="pin" x="1205" y="828">pin 40</text>
  <text class="small" x="1260" y="828">BCM21 -> channel B `IB`</text>
  <text class="small" x="1260" y="846">/ `F2_IB`</text>

  <rect class="panel" x="1140" y="960" width="700" height="380"/>
  <text class="label" x="1170" y="1000">Power map</text>
  <text class="small" x="1170" y="1026">The control surface depends on both the 5 V_DIG rail from the power board</text>
  <text class="small" x="1170" y="1046">and the Pi-generated 3V3 rail. This section shows power direction only.</text>

  <rect class="yellow" x="1180" y="1070" width="180" height="160"/>
  <text class="label" x="1270" y="1106" text-anchor="middle">12 V wall PSU</text>
  <text class="tiny" x="1270" y="1136" text-anchor="middle">feeds power-entry board</text>
  <text class="tiny" x="1270" y="1156" text-anchor="middle">not direct to control parts</text>

  <rect class="green" x="1410" y="1070" width="200" height="160"/>
  <text class="label" x="1510" y="1106" text-anchor="middle">Power board</text>
  <text class="tiny" x="1510" y="1136" text-anchor="middle">5 V_DIG out -> Pi pin 2 / 4</text>
  <text class="tiny" x="1510" y="1156" text-anchor="middle">GND -> common return</text>
  <text class="tiny" x="1510" y="1176" text-anchor="middle">5 V_DIG also feeds</text>
  <text class="tiny" x="1510" y="1194" text-anchor="middle">the L9110 motor driver</text>

  <rect class="chip" x="1650" y="1070" width="150" height="160"/>
  <text class="label" x="1725" y="1106" text-anchor="middle">Pi 40-pin</text>
  <text class="tiny" x="1725" y="1136" text-anchor="middle">5 V in on pin 2 / 4</text>
  <text class="tiny" x="1725" y="1156" text-anchor="middle">3V3 out on pin 1 / 17</text>
  <text class="tiny" x="1725" y="1176" text-anchor="middle">common GND pins</text>

  <path class="rail5" d="M 1360 1150 L 1410 1150"/>
  <path class="rail5" d="M 1610 1150 L 1650 1150"/>
  <path class="rail3" d="M 1725 1020 L 1725 980 L 880 980 L 880 210"/>
  <path class="rail3" d="M 1725 980 L 195 980 L 195 220"/>
  <path class="railg" d="M 1270 1180 L 1800 1180"/>

  <circle class="dot5" cx="1385" cy="1150" r="5"/>
  <circle class="dot5" cx="1630" cy="1150" r="5"/>
  <circle class="dot3" cx="1725" cy="980" r="5"/>
  <circle class="dotg" cx="1510" cy="1180" r="5"/>
  <text class="tiny" x="1740" y="970">3V3 distribution</text>
  <text class="tiny" x="1520" y="1172">common GND rail</text>

  <path class="sig" d="M 300 405 L 700 405"/>
  <path class="sig" d="M 530 420 L 700 420"/>
  <path class="sig" d="M 300 650 L 700 650"/>
  <path class="sig" d="M 530 670 L 700 670"/>
  <path class="sig" d="M 1060 350 L 1175 516"/>
  <path class="sig" d="M 1060 376 L 1175 542"/>
  <path class="sig" d="M 1060 402 L 1175 568"/>
  <path class="sig" d="M 1060 428 L 1175 594"/>
  <path class="sig" d="M 1060 365 L 1105 365 L 1105 450 L 1175 450" opacity="0"/>

  <path class="sig" d="M 1060 350 L 1105 350 L 1105 750 L 1140 750"/>
  <path class="sig" d="M 530 375 L 700 375" opacity="0"/>

  <path class="i2c" d="M 300 640 L 560 640 L 560 402 L 1175 402"/>
  <path class="i2c" d="M 300 660 L 580 660 L 580 446 L 1175 446"/>
  <path class="i2c" d="M 1060 642 L 1125 642 L 1125 402 L 1175 402"/>
  <path class="i2c" d="M 1060 660 L 1145 660 L 1145 446 L 1175 446"/>

  <path class="sig note" d="M 300 822 L 620 822 L 620 660 L 700 660"/>
  <path class="sig note" d="M 300 860 L 640 860 L 640 678 L 700 678"/>

  <path class="sig" d="M 300 385 L 580 385 L 580 354 L 700 354"/>
  <path class="sig" d="M 530 445 L 580 445 L 580 374 L 700 374"/>
  <path class="sig" d="M 530 580 L 620 580 L 620 394 L 700 394"/>
  <path class="sig" d="M 530 600 L 640 600 L 640 414 L 700 414"/>

  <path class="motor" d="M 560 442 L 700 840"/>
  <path class="motor" d="M 560 462 L 700 860"/>
  <path class="motor" d="M 560 577 L 700 880"/>
  <path class="motor" d="M 560 597 L 700 900"/>
  <path class="motor note" d="M 1090 840 L 1175 696"/>
  <path class="motor note" d="M 1090 860 L 1175 740"/>
  <path class="motor note" d="M 1090 880 L 1175 784"/>
  <path class="motor note" d="M 1090 900 L 1175 828"/>

  <path class="sig" d="M 1060 470 L 1120 470 L 1120 430 L 1175 430" opacity="0"/>
  <path class="sig" d="M 1060 455 L 1120 455 L 1120 430 L 1175 430" opacity="0"/>

  <path class="sig" d="M 1060 364 L 1110 364 L 1110 820 L 1175 820" opacity="0"/>

  <path class="sig" d="M 1060 344 L 1110 344 L 1110 230 L 1175 230" opacity="0"/>

  <path class="sig" d="M 1060 364 L 1120 364 L 1120 1030 L 1140 1030" opacity="0"/>

  <path class="sig" d="M 1060 365 L 1110 365 L 1110 460 L 1175 460" opacity="0"/>

  <path class="sig" d="M 1060 364 L 1105 364 L 1105 430 L 1175 430" opacity="0"/>

  <path class="sig" d="M 1060 364 L 1110 364 L 1110 1020 L 1180 1020" opacity="0"/>

  <path class="sig" d="M 1060 364 L 1140 364 L 1140 1010 L 1270 1010" opacity="0"/>

  <path class="sig" d="M 1060 364 L 1110 364 L 1110 1175 L 1800 1175" opacity="0"/>

  <path class="sig" d="M 1060 364 L 1120 364 L 1120 430 L 1175 430" opacity="0"/>

  <path class="sig" d="M 1060 325 L 1095 325 L 1095 495 L 1175 495" opacity="0"/>

  <path class="sig" d="M 1060 285 L 1100 285 L 1100 520 L 1175 520" opacity="0"/>

  <circle class="dots" cx="700" cy="354" r="5"/>
  <circle class="dots" cx="700" cy="374" r="5"/>
  <circle class="dots" cx="700" cy="394" r="5"/>
  <circle class="dots" cx="700" cy="414" r="5"/>
  <circle class="doti" cx="1175" cy="402" r="5"/>
  <circle class="doti" cx="1175" cy="446" r="5"/>
  <circle class="dotm" cx="700" cy="840" r="5"/>
  <circle class="dotm" cx="700" cy="860" r="5"/>
  <circle class="dotm" cx="700" cy="880" r="5"/>
  <circle class="dotm" cx="700" cy="900" r="5"/>
  <circle class="doti" cx="1060" cy="642" r="5"/>
  <circle class="doti" cx="1060" cy="660" r="5"/>

  <rect class="callout" x="80" y="1380" width="1020" height="190"/>
  <text class="small" x="100" y="1414">What is exact in the repo today</text>
  <text class="tiny" x="100" y="1438">Mux select lines: BCM5, BCM6, BCM13, BCM26 on physical pins 29, 31, 33, 37.</text>
  <text class="tiny" x="100" y="1458">Shared I2C: BCM2 / pin 3 for SDA and BCM3 / pin 5 for SCL feed both</text>
  <text class="tiny" x="100" y="1476">the NeoSlider and the MCP23017.</text>
  <text class="tiny" x="100" y="1496">Pot bank and motorized-fader feedback tracks go through the CD74HC4067E</text>
  <text class="tiny" x="100" y="1514">into ADS1256 AD0. Buttons stay digital on the expander.</text>
  <text class="tiny" x="100" y="1534">First-pass button bank: one button between each `GPA0-GPA7` input and GND,</text>
  <text class="tiny" x="100" y="1552">with the MCP23017 internal pull-ups enabled.</text>

  <rect class="callout" x="1120" y="1380" width="720" height="190"/>
  <text class="small" x="1140" y="1414">First-pass motor logic</text>
  <text class="tiny" x="1140" y="1438">This revision uses BCM23, BCM24, BCM25, and BCM21 for the four</text>
  <text class="tiny" x="1140" y="1456">L9110 `IA` / `IB` inputs.</text>
  <text class="tiny" x="1140" y="1476">Per channel, `1/0` drives one way, `0/1` drives the other way,</text>
  <text class="tiny" x="1140" y="1494">`0/0` coasts, and `1/1` brakes.</text>
  <text class="tiny" x="1140" y="1514">The current four-GPIO layout remains valid without hardware changes.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-label="Rough DIY enclosure layout option 2">
  <defs>
    <style>
      .bg { fill: #f6f2ea; }
      .panel { fill: #fffdf9; stroke: #222; stroke-width: 2.5; }
      .service { fill: #f3f7ff; stroke: #2b4b7c; stroke-width: 2; stroke-dasharray: 10 8; }
      .slot { fill: #ffffff; stroke: #2b4b7c; stroke-width: 2.5; rx: 8; ry: 8; }
      .jack { fill: #f7fbff; stroke: #222; stroke-width: 2.2; }
      .pot { fill: #eef3ff; stroke: #1d3b66; stroke-width: 2.2; }
      .fader { fill: #fff8e8; stroke: #8a5b00; stroke-width: 2.5; rx: 8; ry: 8; }
      .callout { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; }
      .small { fill: #333; font-family: Arial, Helvetica, sans-serif; font-size: 13px; }
      .tiny { fill: #555; font-family: Arial, Helvetica, sans-serif; font-size: 11px; }
      .title { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #333; font-family: Arial, Helvetica, sans-serif; font-size: 15px; }
      .label { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; }
      .dash { stroke-dasharray: 10 8; }
      .guide { stroke: #2f2f2f; stroke-width: 2; fill: none; }
      .thin { stroke: #444; stroke-width: 1.5; fill: none; }
      .dim { stroke: #444; stroke-width: 1.7; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .note { fill: #6b5b4a; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="980"/>

  <text class="title" x="60" y="50">DIY enclosure option 2 - rough SVG layout</text>
  <text class="subtitle" x="60" y="76">Plywood shell + 3 mm aluminum top panel. Not to scale. Use module templates for the NeoSlider and motorized faders.</text>

  <g transform="translate(0,0)">
    <text class="callout" x="70" y="112">Top panel layout</text>
    <rect class="panel" x="70" y="130" width="840" height="520" rx="18" ry="18"/>
    <text class="small" x="90" y="156">Rough footprint: 520 x 300 mm panel, 15 degree desktop slope</text>

    <line class="dim" x1="170" y1="108" x2="810" y2="108"/>
    <text class="tiny" x="490" y="99" text-anchor="middle">520 mm wide</text>
    <line class="dim" x1="42" y1="192" x2="42" y2="590"/>
    <text class="tiny" x="24" y="392" transform="rotate(-90 24 392)" text-anchor="middle">300 mm deep</text>

    <rect class="service" x="105" y="146" width="770" height="60" rx="12" ry="12"/>
    <text class="label" x="490" y="171" text-anchor="middle">Rear service bay / not on faceplate</text>
    <text class="tiny" x="490" y="191" text-anchor="middle">Pi, power entry, wiring, and rear access cover</text>

    <circle class="jack" cx="165" cy="262" r="15"/>
    <circle class="jack" cx="165" cy="320" r="15"/>
    <circle class="jack" cx="165" cy="378" r="15"/>
    <text class="tiny" x="110" y="238">CV IN 1-3</text>
    <text class="tiny" x="192" y="266">J1</text>
    <text class="tiny" x="192" y="324">J2</text>
    <text class="tiny" x="192" y="382">J3</text>

    <circle class="jack" cx="165" cy="470" r="15"/>
    <circle class="jack" cx="165" cy="528" r="15"/>
    <circle class="jack" cx="165" cy="586" r="15"/>
    <circle class="jack" cx="165" cy="620" r="15"/>
    <text class="tiny" x="110" y="446">CV OUT 1-4</text>
    <text class="tiny" x="192" y="474">J4</text>
    <text class="tiny" x="192" y="532">J5</text>
    <text class="tiny" x="192" y="590">J6</text>
    <text class="tiny" x="192" y="624">J7</text>

    <rect class="slot" x="305" y="214" width="350" height="20" rx="8" ry="8"/>
    <text class="tiny" x="480" y="206" text-anchor="middle">NeoSlider slot / use actual module template</text>

    <text class="tiny" x="330" y="275">P1</text>
    <text class="tiny" x="410" y="275">P2</text>
    <text class="tiny" x="490" y="275">P3</text>
    <text class="tiny" x="570" y="275">P4</text>
    <text class="tiny" x="330" y="365">P5</text>
    <text class="tiny" x="410" y="365">P6</text>
    <text class="tiny" x="490" y="365">P7</text>
    <text class="tiny" x="570" y="365">P8</text>

    <circle class="pot" cx="340" cy="302" r="17"/>
    <circle class="pot" cx="420" cy="302" r="17"/>
    <circle class="pot" cx="500" cy="302" r="17"/>
    <circle class="pot" cx="580" cy="302" r="17"/>
    <circle class="pot" cx="340" cy="392" r="17"/>
    <circle class="pot" cx="420" cy="392" r="17"/>
    <circle class="pot" cx="500" cy="392" r="17"/>
    <circle class="pot" cx="580" cy="392" r="17"/>

    <text class="label" x="490" y="452" text-anchor="middle">8 user-supplied manual pots</text>
    <text class="tiny" x="490" y="472" text-anchor="middle">Keep centers roughly 28-30 mm apart in the final drill template</text>

    <rect class="fader" x="355" y="516" width="210" height="16" rx="8" ry="8"/>
    <rect class="fader" x="595" y="516" width="210" height="16" rx="8" ry="8"/>
    <circle class="jack" cx="460" cy="524" r="8"/>
    <circle class="jack" cx="700" cy="524" r="8"/>
    <text class="tiny" x="460" y="548" text-anchor="middle">Motorized fader 1</text>
    <text class="tiny" x="700" y="548" text-anchor="middle">Motorized fader 2</text>

    <rect class="service" x="675" y="232" width="180" height="62" rx="12" ry="12"/>
    <text class="tiny" x="765" y="257" text-anchor="middle">Gate inputs 1-3</text>
    <circle class="jack" cx="725" cy="277" r="12"/>
    <circle class="jack" cx="765" cy="277" r="12"/>
    <circle class="jack" cx="805" cy="277" r="12"/>

    <line class="thin" x1="165" y1="247" x2="165" y2="225"/>
    <line class="thin" x1="165" y1="305" x2="165" y2="225"/>
    <line class="thin" x1="165" y1="363" x2="165" y2="225"/>
    <line class="thin" x1="165" y1="455" x2="165" y2="433"/>
    <line class="thin" x1="165" y1="513" x2="165" y2="433"/>
    <line class="thin" x1="165" y1="571" x2="165" y2="433"/>
    <line class="thin" x1="165" y1="605" x2="165" y2="433"/>

    <text class="note" x="90" y="656">Hole centers, spacing, and exact cutouts should be transferred to a paper or cardboard drill template before drilling metal.</text>
  </g>

  <g transform="translate(960,130)">
    <text class="callout" x="0" y="-18">Side profile sketch</text>
    <rect class="panel" x="0" y="0" width="460" height="520" rx="18" ry="18"/>
    <text class="small" x="20" y="26">Wedge shell made from birch plywood</text>

    <polygon points="55,360 360,360 430,470 120,470" fill="#fffdf9" stroke="#222" stroke-width="2.5"/>
    <polygon points="360,360 430,470 430,505 360,395" fill="#f3f0e7" stroke="#222" stroke-width="2.5"/>
    <line class="guide" x1="55" y1="360" x2="360" y2="360"/>
    <line class="guide" x1="120" y1="470" x2="430" y2="470"/>

    <rect class="service" x="250" y="95" width="150" height="82" rx="12" ry="12"/>
    <text class="tiny" x="325" y="125" text-anchor="middle">rear service bay</text>
    <text class="tiny" x="325" y="143" text-anchor="middle">Pi, PSU, wiring</text>

    <line class="dim" x1="55" y1="338" x2="430" y2="338"/>
    <text class="tiny" x="242" y="329" text-anchor="middle">about 520 mm</text>
    <line class="dim" x1="28" y1="360" x2="28" y2="470"/>
    <text class="tiny" x="12" y="415" transform="rotate(-90 12 415)" text-anchor="middle">front height about 85 mm</text>
    <line class="dim" x1="430" y1="360" x2="430" y2="505"/>
    <text class="tiny" x="444" y="438" transform="rotate(-90 444 438)" text-anchor="middle">rear height about 120 mm</text>

    <text class="label" x="55" y="408">Front</text>
    <text class="label" x="372" y="408">Rear</text>
    <text class="tiny" x="55" y="435">15 degree slope</text>
    <text class="tiny" x="55" y="456">12 mm side cheeks</text>
    <text class="tiny" x="55" y="478">3 mm aluminum top panel</text>
    <text class="tiny" x="55" y="500">removable rear access panel</text>

    <rect class="fader" x="85" y="80" width="200" height="18" rx="8" ry="8"/>
    <rect class="fader" x="85" y="112" width="200" height="18" rx="8" ry="8"/>
    <text class="tiny" x="185" y="74" text-anchor="middle">Panel stack and control depth</text>
  </g>

  <g transform="translate(70,705)">
    <text class="callout" x="0" y="0">Build notes</text>
    <text class="small" x="0" y="26">1. Cut the plywood shell first and dry-fit the slope.</text>
    <text class="small" x="0" y="48">2. Make a paper drill template, then mark the NeoSlider and fader cutouts from the actual modules.</text>
    <text class="small" x="0" y="70">3. Keep the Pi, power, and rear wiring on a removable tray behind the faceplate.</text>
    <text class="small" x="0" y="92">4. Treat the faceplate dimensions as rough: final hole placement should follow the mounted hardware.</text>
  </g>
</svg>

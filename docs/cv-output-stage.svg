<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320" role="img" aria-label="CV output stage rough schematic with pin numbers and part icons">
  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .panel { fill: #ffffff; stroke: #202020; stroke-width: 2.5; rx: 18; ry: 18; }
      .chip { fill: #eef9ee; stroke: #27632a; stroke-width: 2.5; rx: 18; ry: 18; }
      .ic { fill: #eef3ff; stroke: #1d3b66; stroke-width: 2.5; rx: 12; ry: 12; }
      .soft { fill: #f2f2f2; stroke: #555; stroke-width: 2; rx: 12; ry: 12; }
      .label { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; }
      .small { fill: #333; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .tiny { fill: #555; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
      .pin { fill: #1d3b66; font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; }
      .pinsoft { fill: #666; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
      .title { fill: #111; font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #333; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .wire { stroke: #2f2f2f; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .wire2 { stroke: #2f2f2f; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 10 8; }
      .rail5 { stroke: #27632a; stroke-width: 4; fill: none; }
      .railgnd { stroke: #222; stroke-width: 4; fill: none; }
      .railref { stroke: #7a4f00; stroke-width: 4; fill: none; }
      .node { fill: #2f2f2f; }
    </style>

    <g id="res-1k">
      <line class="wire2" x1="0" y1="12" x2="16" y2="12"/>
      <rect x="16" y="2" width="74" height="20" rx="4" ry="4" fill="#f2d5a0" stroke="#6f4f1a" stroke-width="1.4"/>
      <rect x="30" y="2" width="5" height="20" fill="#8b5a2b"/>
      <rect x="42" y="2" width="5" height="20" fill="#111"/>
      <rect x="54" y="2" width="5" height="20" fill="#c62828"/>
      <rect x="68" y="2" width="5" height="20" fill="#d4af37"/>
      <line class="wire2" x1="90" y1="12" x2="106" y2="12"/>
    </g>

    <g id="res-10k-0p1">
      <line class="wire2" x1="0" y1="12" x2="16" y2="12"/>
      <rect x="16" y="2" width="82" height="20" rx="4" ry="4" fill="#f2d5a0" stroke="#6f4f1a" stroke-width="1.4"/>
      <rect x="28" y="2" width="5" height="20" fill="#8b5a2b"/>
      <rect x="40" y="2" width="5" height="20" fill="#111"/>
      <rect x="52" y="2" width="5" height="20" fill="#111"/>
      <rect x="64" y="2" width="5" height="20" fill="#c62828"/>
      <rect x="80" y="2" width="5" height="20" fill="#8e24aa"/>
      <line class="wire2" x1="98" y1="12" x2="114" y2="12"/>
    </g>

    <g id="res-9k76-0p1">
      <line class="wire2" x1="0" y1="12" x2="16" y2="12"/>
      <rect x="16" y="2" width="82" height="20" rx="4" ry="4" fill="#f2d5a0" stroke="#6f4f1a" stroke-width="1.4"/>
      <rect x="28" y="2" width="5" height="20" fill="#ffffff" stroke="#bbb" stroke-width="0.4"/>
      <rect x="40" y="2" width="5" height="20" fill="#8e24aa"/>
      <rect x="52" y="2" width="5" height="20" fill="#1565c0"/>
      <rect x="64" y="2" width="5" height="20" fill="#8b5a2b"/>
      <rect x="80" y="2" width="5" height="20" fill="#8e24aa"/>
      <line class="wire2" x1="98" y1="12" x2="114" y2="12"/>
    </g>

    <g id="cap-icon">
      <line class="wire2" x1="0" y1="0" x2="0" y2="16"/>
      <line class="wire2" x1="-14" y1="16" x2="14" y2="16"/>
      <line class="wire2" x1="-14" y1="26" x2="14" y2="26"/>
      <line class="wire2" x1="0" y1="26" x2="0" y2="44"/>
    </g>

    <g id="diode-up-clamp">
      <line class="wire2" x1="0" y1="44" x2="0" y2="0"/>
      <rect x="-10" y="10" width="20" height="24" rx="4" ry="4" fill="#f4e6c7" stroke="#7a5a28" stroke-width="1.2"/>
      <rect x="-10" y="10" width="4" height="24" fill="#111"/>
      <text class="tiny" x="14" y="26">K</text>
      <text class="tiny" x="14" y="40">A</text>
    </g>

    <g id="diode-down-clamp">
      <line class="wire2" x1="0" y1="0" x2="0" y2="44"/>
      <rect x="-10" y="10" width="20" height="24" rx="4" ry="4" fill="#f4e6c7" stroke="#7a5a28" stroke-width="1.2"/>
      <rect x="6" y="10" width="4" height="24" fill="#111"/>
      <text class="tiny" x="14" y="18">A</text>
      <text class="tiny" x="14" y="38">K</text>
    </g>

    <g id="trim-501">
      <rect x="0" y="0" width="118" height="78" rx="10" ry="10" fill="#fff8e8" stroke="#8a5b00" stroke-width="2.2"/>
      <line class="wire2" x1="20" y1="78" x2="20" y2="98"/>
      <line class="wire2" x1="59" y1="78" x2="59" y2="98"/>
      <line class="wire2" x1="98" y1="78" x2="98" y2="98"/>
      <circle class="node" cx="59" cy="18" r="3.5"/>
      <path class="wire2" d="M 76 8 L 59 18 L 42 34"/>
      <path class="wire2" d="M 20 78 L 20 88 L 59 88"/>
      <text class="small" x="59" y="34" text-anchor="middle">3296W</text>
      <text class="tiny" x="59" y="50" text-anchor="middle">1-501LF</text>
      <text class="tiny" x="20" y="112" text-anchor="middle">1</text>
      <text class="tiny" x="59" y="112" text-anchor="middle">2</text>
      <text class="tiny" x="98" y="112" text-anchor="middle">3</text>
      <text class="tiny" x="59" y="126" text-anchor="middle">2 = wiper, 1 tied to 2</text>
    </g>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1320"/>

  <text class="title" x="60" y="52">CV output stage rough schematic with numbered pins</text>
  <text class="subtitle" x="60" y="82">This is one repeatable output channel plus the shared 2.5 V reference. IC pin numbers are from the TI OPA277 and LM4040 pin tables.</text>

  <path class="rail5" d="M 60 118 L 1840 118"/>
  <text class="small" x="74" y="108">5 V_A rail</text>
  <path class="railref" d="M 60 160 L 1840 160"/>
  <text class="small" x="74" y="150">2.5 V reference rail</text>
  <path class="railgnd" d="M 60 1260 L 1840 1260"/>
  <text class="small" x="74" y="1250">GND star point</text>

  <rect class="panel" x="60" y="215" width="520" height="420"/>
  <text class="label" x="86" y="248">Shared reference block</text>
  <text class="small" x="86" y="274">LM4040AIZ-2.5/NOPB, TO-92 bottom view</text>

  <use href="#res-10k-0p1" x="110" y="335"/>
  <text class="small" x="178" y="326" text-anchor="middle">RREF 10k 0.1%</text>
  <text class="tiny" x="178" y="380" text-anchor="middle">brown-black-black-red-violet</text>

  <circle class="node" cx="310" cy="347" r="5"/>
  <text class="tiny" x="322" y="339">REF_2V5 node</text>

  <path class="wire" d="M 60 118 L 110 118 L 110 347"/>
  <path class="wire" d="M 224 347 L 310 347"/>
  <path class="wire" d="M 310 347 L 310 160"/>

  <path class="wire2 dash" d="M 310 160 L 610 160 L 610 710"/>
  <text class="tiny" x="396" y="148">optional shared DAC reference feed</text>

  <g transform="translate(120,430)">
    <text class="small" x="120" y="-12" text-anchor="middle">Uref LM4040AIZ-2.5/NOPB</text>
    <text class="tiny" x="120" y="6" text-anchor="middle">3-pin TO-92, bottom view</text>
    <path class="wire2" d="M 60 36 Q 120 -18 180 36 L 180 90 L 60 90 Z" fill="#eef3ff" stroke="#1d3b66" stroke-width="2.2"/>
    <line class="wire2" x1="85" y1="90" x2="85" y2="132"/>
    <line class="wire2" x1="120" y1="90" x2="120" y2="132"/>
    <line class="wire2" x1="155" y1="90" x2="155" y2="132"/>
    <text class="pin" x="85" y="108" text-anchor="middle">1</text>
    <text class="pin" x="120" y="108" text-anchor="middle">2</text>
    <text class="pin" x="155" y="108" text-anchor="middle">3</text>
    <text class="tiny" x="85" y="148" text-anchor="middle">float</text>
    <text class="tiny" x="85" y="162" text-anchor="middle">or anode</text>
    <text class="tiny" x="120" y="148" text-anchor="middle">cathode</text>
    <text class="tiny" x="155" y="148" text-anchor="middle">anode</text>
  </g>

  <path class="wire" d="M 240 520 L 240 347 L 310 347"/>
  <path class="wire" d="M 275 520 L 275 347 L 310 347"/>
  <path class="wire" d="M 310 520 L 310 1260"/>

  <use href="#cap-icon" x="390" y="347"/>
  <text class="small" x="430" y="370">CREF1 100 nF</text>
  <path class="wire" d="M 390 391 L 390 1260"/>
  <use href="#cap-icon" x="495" y="347"/>
  <text class="small" x="535" y="370">CREF2 10 uF</text>
  <path class="wire" d="M 495 391 L 495 1260"/>

  <rect class="panel" x="620" y="215" width="1220" height="900"/>
  <text class="label" x="648" y="248">One CV output channel, repeat x4</text>
  <text class="small" x="648" y="274">Repeat for DAC0-DAC3 and CV OUT 1-4. Pins shown for the OPA277 PDIP top view.</text>

  <rect class="soft" x="665" y="345" width="180" height="120"/>
  <text class="label" x="755" y="384" text-anchor="middle">DACx</text>
  <text class="small" x="755" y="412" text-anchor="middle">DAC OUT pin</text>
  <text class="tiny" x="755" y="434" text-anchor="middle">0-2.5 V nominal</text>
  <text class="tiny" x="755" y="454" text-anchor="middle">return to GND star</text>

  <use href="#res-1k" x="875" y="392"/>
  <text class="small" x="942" y="384" text-anchor="middle">R1 1k</text>
  <text class="tiny" x="942" y="438" text-anchor="middle">brown-black-red-gold</text>

  <circle class="node" cx="1030" cy="404" r="5"/>
  <text class="tiny" x="1042" y="394">filter node</text>

  <use href="#cap-icon" x="1030" y="404"/>
  <text class="small" x="1068" y="430">C1 10 nF C0G</text>
  <path class="wire" d="M 1030 448 L 1030 1260"/>

  <path class="wire" d="M 845 404 L 875 404"/>
  <path class="wire" d="M 981 404 L 1030 404"/>

  <g transform="translate(1140,310)">
    <text class="small" x="160" y="-20" text-anchor="middle">U1 OPA277PA</text>
    <text class="tiny" x="160" y="-4" text-anchor="middle">PDIP-8 top view</text>
    <rect class="ic" x="72" y="20" width="176" height="340"/>
    <path class="wire2" d="M 134 20 Q 160 -6 186 20"/>

    <line class="wire2" x1="72" y1="60" x2="40" y2="60"/>
    <line class="wire2" x1="72" y1="140" x2="40" y2="140"/>
    <line class="wire2" x1="72" y1="220" x2="40" y2="220"/>
    <line class="wire2" x1="72" y1="300" x2="40" y2="300"/>
    <line class="wire2" x1="248" y1="60" x2="280" y2="60"/>
    <line class="wire2" x1="248" y1="140" x2="280" y2="140"/>
    <line class="wire2" x1="248" y1="220" x2="280" y2="220"/>
    <line class="wire2" x1="248" y1="300" x2="280" y2="300"/>

    <text class="pin" x="56" y="52" text-anchor="end">1</text>
    <text class="pin" x="56" y="132" text-anchor="end">2</text>
    <text class="pin" x="56" y="212" text-anchor="end">3</text>
    <text class="pin" x="56" y="292" text-anchor="end">4</text>
    <text class="pin" x="264" y="52">8</text>
    <text class="pin" x="264" y="132">7</text>
    <text class="pin" x="264" y="212">6</text>
    <text class="pin" x="264" y="292">5</text>

    <text class="pinsoft" x="84" y="64">offset trim</text>
    <text class="pin" x="84" y="144">-IN</text>
    <text class="pin" x="84" y="224">+IN</text>
    <text class="pin" x="84" y="304">V-</text>
    <text class="pinsoft" x="182" y="64">offset trim</text>
    <text class="pin" x="182" y="144">V+</text>
    <text class="pin" x="182" y="224">OUT</text>
    <text class="pinsoft" x="182" y="304">NC</text>

    <text class="tiny" x="160" y="196" text-anchor="middle">single precision op-amp</text>
  </g>

  <path class="wire" d="M 1030 404 L 1212 530"/>
  <circle class="node" cx="1212" cy="530" r="5"/>
  <text class="tiny" x="1168" y="512">pin 3 +IN</text>

  <path class="wire" d="M 1590 450 L 1590 118"/>
  <circle class="node" cx="1590" cy="450" r="5"/>
  <text class="tiny" x="1602" y="442">pin 7 V+</text>

  <path class="wire" d="M 1212 610 L 1212 1260"/>
  <circle class="node" cx="1212" cy="610" r="5"/>
  <text class="tiny" x="1164" y="628">pin 4 V-</text>

  <circle class="node" cx="1212" cy="450" r="5"/>
  <text class="tiny" x="1168" y="468">pin 2 -IN</text>

  <circle class="node" cx="1420" cy="530" r="5"/>
  <text class="tiny" x="1432" y="522">pin 6 OUT</text>

  <use href="#res-9k76-0p1" x="1460" y="438"/>
  <text class="small" x="1533" y="430" text-anchor="middle">R3 9.76k 0.1%</text>
  <text class="tiny" x="1533" y="484" text-anchor="middle">white-violet-blue-brown-violet</text>
  <path class="wire" d="M 1420 530 L 1460 530 L 1460 450"/>

  <g transform="translate(1626,405)">
    <use href="#trim-501"/>
  </g>
  <text class="small" x="1685" y="390" text-anchor="middle">TRIM1 in feedback path</text>
  <text class="tiny" x="1685" y="542" text-anchor="middle">rough wiring shown as rheostat</text>

  <path class="wire" d="M 1574 450 L 1626 450"/>
  <path class="wire" d="M 1646 503 L 1646 560 L 1212 560 L 1212 450"/>
  <path class="wire" d="M 1685 503 L 1685 560"/>
  <path class="wire" d="M 1724 503 L 1724 560 L 1212 560"/>
  <text class="tiny" x="1230" y="578">feedback return to pin 2</text>

  <use href="#res-10k-0p1" x="1040" y="742" transform="rotate(90 1097 754)"/>
  <text class="small" x="1136" y="790">R2 10k 0.1%</text>
  <text class="tiny" x="1136" y="808">pin 2 to GND</text>
  <path class="wire" d="M 1212 450 L 1097 450 L 1097 742"/>
  <path class="wire" d="M 1097 856 L 1097 1260"/>

  <use href="#cap-icon" x="1520" y="450"/>
  <text class="small" x="1556" y="476">C2 100 nF</text>
  <text class="tiny" x="1556" y="494">from pin 7 to pin 4</text>
  <path class="wire" d="M 1520 404 L 1520 118"/>
  <path class="wire" d="M 1520 494 L 1520 1260"/>

  <use href="#res-1k" x="1455" y="518"/>
  <text class="small" x="1522" y="510" text-anchor="middle">R4 1k</text>
  <text class="tiny" x="1522" y="564" text-anchor="middle">brown-black-red-gold</text>
  <path class="wire" d="M 1420 530 L 1455 530"/>

  <circle class="node" cx="1622" cy="530" r="5"/>
  <text class="tiny" x="1634" y="520">output node</text>

  <use href="#diode-up-clamp" x="1708" y="486"/>
  <text class="small" x="1744" y="462">D4 1N4148-DIO</text>
  <text class="tiny" x="1744" y="478">anode to output</text>
  <text class="tiny" x="1744" y="494">cathode to 5 V_A</text>
  <path class="wire" d="M 1622 530 L 1708 530"/>
  <path class="wire" d="M 1708 486 L 1708 118"/>

  <use href="#diode-down-clamp" x="1790" y="530"/>
  <text class="small" x="1826" y="584">D5 1N4148-DIO</text>
  <text class="tiny" x="1826" y="600">anode to GND</text>
  <text class="tiny" x="1826" y="616">cathode to output</text>
  <path class="wire" d="M 1622 530 L 1790 530"/>
  <path class="wire" d="M 1790 574 L 1790 1260"/>

  <rect class="soft" x="1660" y="690" width="140" height="110"/>
  <text class="label" x="1730" y="726" text-anchor="middle">Jx</text>
  <text class="small" x="1730" y="752" text-anchor="middle">CV output jack</text>
  <text class="tiny" x="1730" y="776" text-anchor="middle">tip -> output node</text>
  <text class="tiny" x="1730" y="794" text-anchor="middle">sleeve -> GND</text>
  <path class="wire" d="M 1622 530 L 1730 530 L 1730 690"/>
  <path class="wire" d="M 1730 800 L 1730 1260"/>

  <rect class="panel" x="620" y="1140" width="1220" height="120"/>
  <text class="small" x="648" y="1172">Wiring order:</text>
  <text class="tiny" x="648" y="1194">DAC OUT -> R1 -> filter node. Filter node -> C1 to GND and -> OPA277 pin 3 (+IN). OPA277 pin 6 (OUT) -> R4 -> output node -> jack tip.</text>
  <text class="tiny" x="648" y="1214">OPA277 pin 2 (-IN) -> R2 -> GND. Feedback is pin 6 -> R3 -> TRIM1 -> pin 2. OPA277 pin 7 -> 5 V_A, pin 4 -> GND, and C2 sits across pins 7 and 4.</text>
  <text class="tiny" x="648" y="1234">LM4040 TO-92 bottom-view pins: pin 2 cathode to REF_2V5, pin 3 anode to GND, pin 1 float or tie to anode if desired.</text>
</svg>